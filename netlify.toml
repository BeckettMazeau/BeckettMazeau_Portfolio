# ==========================================================================
# Netlify Configuration — beckettmazeau.com
# Static site · No build step required
# ==========================================================================

[build]
  # No build command needed for a vanilla static site
  publish = "."

# ---------- Security & Performance Headers ----------
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"

    # Clickjacking protection
    X-Frame-Options = "DENY"

    # XSS filter (legacy browsers)
    X-XSS-Protection = "1; mode=block"

    # Referrer policy
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Permissions policy — restrict browser features you don't use
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"

    # Content Security Policy — adjust if you add external scripts/fonts
    # NOTE: 'unsafe-inline' on script-src is needed because Netlify's
    #        Cloudflare proxy injects an inline email-obfuscation script.
    #        If you disable email obfuscation in Netlify settings, you can
    #        remove 'unsafe-inline' from script-src.
    Content-Security-Policy = "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://placehold.co data:; script-src 'self' 'unsafe-inline'"

    # HSTS — enforce HTTPS (uncomment after confirming HTTPS works)
    # Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# ---------- Cache static assets ----------
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

